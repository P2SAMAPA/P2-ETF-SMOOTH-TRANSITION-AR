name: Train Smooth Transition Models

on:
  schedule:
    - cron: "0 0 1 * *"  # monthly on 1st
  workflow_dispatch:

jobs:
  diagnostics:
    name: Linearity Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run diagnostics
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python run_diagnostics.py

  train:
    name: Train — ${{ matrix.model }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: diagnostics
    strategy:
      fail-fast: false
      matrix:
        model: [setar, lstar, estar]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train ${{ matrix.model }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python run_training.py --model ${{ matrix.model }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: models-${{ matrix.model }}-${{ github.run_id }}
          path: models/${{ matrix.model }}/
          retention-days: 7

  backtest:
    name: Walk-Forward Backtest
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: train
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download all model artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: models-*-${{ github.run_id }}
          path: models/
          merge-multiple: true
      - name: Run backtest
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python run_backtest.py
      - name: Print summary
        run: |
          python3 - << 'PYEOF'
          import pandas as pd, pathlib
          p = pathlib.Path("backtest/backtest_summary.csv")
          if p.exists():
              df = pd.read_csv(p)
              print(f"Backtest rows: {len(df)}")
              print(df.sort_values("sortino", ascending=False).head(10).to_string(index=False))
          else:
              print("No backtest CSV found")
          PYEOF
      - name: Upload backtest artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_id }}
          path: backtest/
          retention-days: 7
