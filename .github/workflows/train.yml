name: Train Smooth Transition Models

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *'   # monthly on 1st
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linearity diagnostics
      run: python run_diagnostics.py

    - name: Train SETAR models
      run: python run_training.py --model setar

    - name: Train LSTAR models
      run: python run_training.py --model lstar

    - name: Train ESTAR models
      run: python run_training.py --model estar

    - name: Run walk‑forward backtest
      run: python run_backtest.py

    - name: Upload results to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python upload_results.py

    - name: Upload artifacts (for debugging)
      uses: actions/upload-artifact@v4
      with:
        name: smooth-transition-results
        path: |
          models/
          backtest/
          diagnostics/
